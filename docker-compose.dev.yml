# 本地开发依赖：PostgreSQL 16 + Redis 7
# 启动：docker compose -f docker-compose.dev.yml up -d
# 停止：docker compose -f docker-compose.dev.yml down
# 删除数据卷（彻底重置）：docker compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: aibao-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: aibao
      POSTGRES_PASSWORD: aibao
      POSTGRES_DB: aibao
    ports:
      - "127.0.0.1:5432:5432"   # 仅本机可连，不暴露公网
    volumes:
      - aibao_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibao -d aibao"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aibao-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - aibao_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  aibao_pg_data:
  aibao_redis_data:
