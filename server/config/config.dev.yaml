server:
  port: 8080
  log_dir: ./logs
  log_level: debug

postgres:
  host: 127.0.0.1
  port: 5432
  database: aibao
  user: aibao
  sslmode: disable
  # password: from env AIBAO_POSTGRES_PASSWORD

redis:
  addr: 127.0.0.1:6379
  db: 0
  # password: from env AIBAO_REDIS_PASSWORD

auth:
  access_ttl_minutes: 1440
  refresh_ttl_minutes: 10080
  # jwt_secret: from env AIBAO_AUTH_JWT_SECRET

sms:
  provider: mock
  code_ttl_seconds: 300
  resend_cooldown_sec: 60

crypto:
  # phone_aes_key: from env AIBAO_CRYPTO_PHONE_AES_KEY (64 hex chars = 32 bytes)
  # safehash_salt: from env AIBAO_CRYPTO_SAFEHASH_SALT

llm:
  provider: doubao
  story_model: ep-m-20260318190252-2rxkc   # Doubao-1.5-pro-32k endpoint
  intent_model: ep-20260511153638-cstj9     # Doubao-1.5-lite-32k endpoint (text classification + summary + profile)
  base_url: https://ark.cn-beijing.volces.com/api/v3
  # Plan 9c: bumped 30 → 90 to cover larger generations (5min slot now
  # asks for ~1500 chars; 15min asks for ~4800). Doubao p99 grows linearly
  # with output length. Keep < client dio receiveTimeout (120s).
  timeout_seconds: 90
  max_retries: 1
  story_temperature: 0.8
  intent_temperature: 0
  daily_budget_yuan: 100.0
  price_input_per_mtok: 0.8
  price_output_per_mtok: 2.0
  generate_rpm: 5
  # api_key: from env AIBAO_LLM_DOUBAO_API_KEY

worker:
  enabled: true
  poll_interval_seconds: 5
  batch_size: 10
  max_attempts: 5
  backoff_base_seconds: 2
  backoff_max_seconds: 600

tts:
  provider: minimax
  base_url: https://api.minimax.chat
  model: speech-01-turbo
  voice_id: audiobook_female_1  # Final pick after A/B between tianmei/audiobook_1/audiobook_2/presenter
  format: mp3
  sample_rate: 32000
  bitrate: 128000
  speed: 1.0
  timeout_seconds: 60
  # group_id: from env AIBAO_TTS_MINIMAX_GROUP_ID
  # api_key:  from env AIBAO_TTS_MINIMAX_API_KEY

storage:
  provider: cos
  region: ap-shanghai
  presigned_ttl_seconds: 900
  upload_timeout_seconds: 30
  # bucket:     from env AIBAO_STORAGE_COS_BUCKET
  # app_id:     from env AIBAO_STORAGE_COS_APPID
  # secret_id:  from env AIBAO_STORAGE_COS_SECRET_ID
  # secret_key: from env AIBAO_STORAGE_COS_SECRET_KEY

audio:
  ffmpeg_path: ffmpeg          # PATH lookup; set absolute path in prod if needed
  bgm_cache_dir: ./cache/bgm
  bgm_volume_db: -18
  mix_timeout_seconds: 30
  output_sample_rate: 32000
  output_bitrate_kbps: 128

idhash:
  # Plan 11B: HMAC secret for cost_events.child_id_hash. Override via AIBAO_IDHASH_SECRET in prod.
  secret: aibao-dev-id-hash-secret-change-me

cost:
  price_book_version: v20260525-1
  entries:
    - provider: doubao
      model: doubao-1.5-pro-32k
      billing_mode: standard
      unit: yuan_per_1m_tokens
      input: 4.00
      output: 8.00
    - provider: doubao
      model: doubao-1.5-lite-32k
      billing_mode: standard
      unit: yuan_per_1m_tokens
      input: 0.30
      output: 0.60
    - provider: doubao
      model: doubao-lite
      billing_mode: standard
      unit: yuan_per_1m_tokens
      input: 0.30
      output: 0.60
    - provider: minimax
      model: t2a-v2
      billing_mode: standard
      unit: yuan_per_1k_chars
      chars: 0.315
    - provider: minimax
      model: speech-01-turbo
      billing_mode: standard
      unit: yuan_per_1k_chars
      chars: 0.315
    - provider: tencent_cos
      model: hk-standard
      billing_mode: standard
      put_yuan_per_10k_requests: 0.10
      bandwidth_yuan_per_gb: 0.50
